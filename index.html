            function setupCalculator(winEl, wid) {
                const display = winEl.querySelector('#calc-display');
                let expr = '';
                winEl.querySelectorAll('.calc-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const val = btn.textContent.trim();
                        if (val === 'C') expr = '';
                        else if (val === '⌫') expr = expr.slice(0, -1);
                        else if (val === '=') {
                            try {
                                const sanitized = expr.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g,
                                    '-');
                                expr = String(Function('"use strict";return (' + sanitized + ')')());
                            } catch { expr = 'Error'; }
                        } else if (val === '×') expr += '×';
                        else if (val === '÷') expr += '÷';
                        else if (val === '−') expr += '−';
                        else expr += val;
                        display.value = expr || '0';
                    });
                });
            }

            async function setupFileExplorer(winEl, wid) {
                let currentPath = '/';
                const addressInput = winEl.querySelector('#explorer-address');
                const mainArea = winEl.querySelector('#explorer-main');
                const sidebar = winEl.querySelector('#explorer-sidebar');
                const refresh = async () => {
                    addressInput.value = currentPath;
                    const nodes = await vfs.listDir(currentPath);
                    mainArea.innerHTML = '';
                    if (currentPath !== '/') {
                        const upBtn = document.createElement('div');
                        upBtn.className = 'desktop-icon';
                        upBtn.innerHTML = '<span class="icon-img">📁</span><span class="icon-label">..</span>';
                        upBtn.addEventListener('dblclick', () => {
                            currentPath = currentPath.substring(0, currentPath.lastIndexOf('/')) || '/';
                            refresh();
                        });
                        mainArea.appendChild(upBtn);
                    }
                    nodes.forEach(n => {
                        const el = document.createElement('div');
                        el.className = 'desktop-icon';
                        el.innerHTML =
                            `<span class="icon-img">${n.type==='directory'?'📁':'📄'}</span><span class="icon-label">${n.path.split('/').pop()}</span>`;
                        el.addEventListener('dblclick', () => {
                            if (n.type === 'directory') { currentPath = n.path;
                                refresh(); } else {
                                notifications.show('File', `Opening ${n.path.split('/').pop()}`,
                                    'info');
                            }
                        });
                        el.addEventListener('contextmenu', (e) => {
                            e.preventDefault();
                            showContextMenu(e.clientX, e.clientY, [
                                { label: 'Rename', action: () => { const nn = prompt(
                                            'New name:', n.path.split('/').pop()); if (nn)
                                        vfs.renameNode(n.path, currentPath + '/' +
                                            nn).then(refresh); } },
                                { label: 'Delete', action: () => { vfs.deleteNode(n.path)
                                        .then(refresh);
                                        notifications.show('Deleted', n.path.split('/')
                                            .pop(), 'warning'); } },
                            ]);
                        });
                        mainArea.appendChild(el);
                    });
                    // Sidebar
                    const dirs = ['/', '/Desktop', '/Documents', '/Downloads', '/Pictures', '/Music', '/Videos', '/System',
                        '/Temp'
                    ];
                    sidebar.innerHTML = dirs.map(d =>
                        `<div style="padding:6px 8px;cursor:pointer;border-radius:6px;${d===currentPath?'background:rgba(91,155,213,0.2);':''}" data-path="${d}">📁 ${d==='/'?'Root':d.split('/').pop()}</div>`
                    ).join('');
                    sidebar.querySelectorAll('div').forEach(d => d.addEventListener('click', () => { currentPath = d
                            .dataset.path;
                        refresh(); }));
                };
                addressInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') { currentPath = addressInput.value || '/';
                        refresh(); }
                });
                winEl.querySelectorAll('.explorer-nav-btn').forEach(b => b.addEventListener('click', () => {
                    const action = b.dataset.action;
                    if (action === 'up') currentPath = currentPath.substring(0, currentPath.lastIndexOf(
                        '/')) || '/';
                    if (action === 'refresh') {}
                    refresh();
                }));
                await refresh();
            }

            function setupSettings(winEl, wid) {
                const nav = winEl.querySelector('#settings-nav');
                const content = winEl.querySelector('#settings-content');
                const sections = [
                    { id: 'appearance', label: '🎨 Appearance', render: () =>
                            `<h3>Appearance</h3><p>Theme: <strong>${themeManager.current}</strong></p>
                <button class="theme-cycle-btn" style="padding:8px 16px;border:1px solid var(--border-medium);border-radius:var(--radius-md);cursor:pointer;">Cycle Theme</button>
                <p style="margin-top:8px;color:var(--text-secondary);font-size:0.8rem;">Click to cycle: dark → light → cyberpunk → ubuntu</p>` },
                    { id: 'storage', label: '💾 Storage', render: async () => {
                            const all = await vfs._dbGetAll();
                            const files = all.filter(n => n.type === 'file');
                            const totalSize = files.reduce((s, f) => s + (f.size || 0), 0);
                            return `<h3>Storage</h3><p>Total files: ${files.length}</p><p>Total size: ${(totalSize/1024).toFixed(1)} KB</p><p>Directories: ${all.filter(n=>n.type==='directory').length}</p>`;
                        } },
                    { id: 'system', label: '🖥️ System', render: () =>
                            `<h3>System Info</h3><p>Processes: ${procManager.list().length}</p><p>Uptime: ${procManager.getUptime()}s</p><p>Total CPU: ${procManager.getTotalCPU().toFixed(1)}%</p><p>Total Memory: ${procManager.getTotalMem()} MB</p>`
                        },
                ];
                nav.innerHTML = sections.map(s =>
                    `<div style="padding:8px 12px;cursor:pointer;border-radius:6px;margin:2px 0;" data-id="${s.id}">${s.label}</div>`
                ).join('');
                const renderSection = async (id) => {
                    const sec = sections.find(s => s.id === id);
                    if (sec) content.innerHTML = await sec.render();
                    if (id === 'appearance') {
                        content.querySelector('.theme-cycle-btn')?.addEventListener('click', () => { themeManager
                                .cycle();
                            renderSection('appearance');
                            notifications.show('Theme', `Switched to ${themeManager.current}`, 'success'); });
                    }
                };
                nav.querySelectorAll('div').forEach(d => d.addEventListener('click', () => renderSection(d.dataset.id)));
                renderSection('appearance');
            }

            function setupSystemMonitor(winEl, wid) {
                const update = () => {
                    const cpuEl = winEl.querySelector('#sys-cpu');
                    const memEl = winEl.querySelector('#sys-mem');
                    const memTotalEl = winEl.querySelector('#sys-mem-total');
                    const storageEl = winEl.querySelector('#sys-storage');
                    const procsEl = winEl.querySelector('#sys-procs');
                    const uptimeEl = winEl.querySelector('#sys-uptime');
                    const cpuBar = winEl.querySelector('#cpu-bar');
                    const memBar = winEl.querySelector('#mem-bar');
                    const procList = winEl.querySelector('#proc-list');
                    const cpu = procManager.getTotalCPU();
                    const mem = procManager.getTotalMem();
                    const memTotal = 2048;
                    if (cpuEl) cpuEl.textContent = cpu.toFixed(1);
                    if (memEl) memEl.textContent = mem;
                    if (memTotalEl) memTotalEl.textContent = memTotal;
                    if (cpuBar) cpuBar.value = cpu;
                    if (memBar) memBar.value = (mem / memTotal) * 100;
                    if (storageEl) storageEl.textContent = (Math.random() * 500 + 200).toFixed(0);
                    if (procsEl) procsEl.textContent = procManager.list().length;
                    if (uptimeEl) uptimeEl.textContent = procManager.getUptime() + 's';
                    if (procList) procList.innerHTML = procManager.list().map(p =>
                        `<div style="padding:2px 0;">PID ${p.pid}: ${p.name} [${p.state}] CPU:${p.cpuUsage.toFixed(1)}% Mem:${p.memoryUsage}MB <button style="color:var(--accent-danger);font-size:0.7rem;cursor:pointer;" data-pid="${p.pid}">Kill</button></div>`
                    ).join('');
                    procList?.querySelectorAll('button').forEach(b => b.addEventListener('click', () => { procManager
                            .kill(parseInt(b.dataset.pid));
                        update(); }));
                };
                update();
                const interval = setInterval(update, 2000);
                // Cleanup on close
                const observer = new MutationObserver(() => {
                    if (!document.contains(winEl)) { clearInterval(interval);
                        observer.disconnect(); }
                });
                observer.observe(document.body, { childList: true, subtree: true });
            }

            function setupMarkdownEditor(winEl, wid) {
                const input = winEl.querySelector('#md-input');
                const preview = winEl.querySelector('#md-preview');
                const key = 'md_content_' + wid;
                input.value = localStorage.getItem(key) || '# Hello\n\nThis is **markdown**.';
                const update = () => {
                    localStorage.setItem(key, input.value);
                    let html = input.value
                        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
                        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
                        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
                        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                        .replace(/\*(.+?)\*/g, '<em>$1</em>')
                        .replace(/`(.+?)`/g, '<code>$1</code>')
                        .replace(/^- (.+)$/gm, '<li>$1</li>')
                        .replace(/\n\n/g, '</p><p>')
                        .replace(/\n/g, '<br>');
                    preview.innerHTML = '<p>' + html + '</p>';
                };
                input.addEventListener('input', update);
                update();
            }

            function setupBrowser(winEl, wid) {
                const urlInput = winEl.querySelector('#browser-url');
                const content = winEl.querySelector('#browser-content');
                const history = ['https://aetheros.local/home'];
                let histIdx = 0;
                const navigate = (url) => {
                    urlInput.value = url;
                    content.innerHTML =
                        `<h2>🌐 AetherOS Browser</h2><p>Simulated page at: <strong>${url}</strong></p><hr style="margin:16px 0;"><p>This is a simulated browser view. In a real implementation, this would render web content.</p><p style="color:#888;margin-top:12px;">🔒 Secure connection | 📍 ${url}</p><div style="margin-top:20px;padding:16px;background:#f0f4ff;border-radius:8px;"><h3>Welcome to AetherOS Web</h3><p>The internal browser simulation allows navigation within the OS environment.</p></div>`;
                };
                urlInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') { const url = urlInput.value;
                        history.splice(histIdx + 1);
                        history.push(url);
                        histIdx = history.length - 1;
                        navigate(url); }
                });
                winEl.querySelectorAll('.browser-nav-btn').forEach(b => b.addEventListener('click', () => {
                    const action = b.dataset.action;
                    if (action === 'back' && histIdx > 0) { histIdx--;
                        navigate(history[histIdx]); }
                    if (action === 'forward' && histIdx < history.length - 1) { histIdx++;
                        navigate(history[histIdx]); }
                    if (action === 'refresh') navigate(history[histIdx]);
                    if (action === 'go') { const url = urlInput.value;
                        history.splice(histIdx + 1);
                        history.push(url);
                        histIdx = history.length - 1;
                        navigate(url); }
                }));
                navigate(history[0]);
            }

            function setupPaint(winEl, wid) {
                const canvas = winEl.querySelector('#paint-canvas');
                const colorInput = winEl.querySelector('#paint-color');
                const sizeInput = winEl.querySelector('#paint-size');
                const clearBtn = winEl.querySelector('#paint-clear');
                const ctx = canvas.getContext('2d');
                let drawing = false;
                const resize = () => { canvas.width = canvas.parentElement.clientWidth;
                    canvas.height = canvas.parentElement.clientHeight - 40;
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(0, 0, canvas.width, canvas.height); };
                resize();
                new ResizeObserver(resize).observe(canvas.parentElement);
                canvas.addEventListener('pointerdown', (e) => { drawing = true;
                    ctx.beginPath();
                    ctx.moveTo(e.offsetX, e.offsetY);
                    ctx.strokeStyle = colorInput.value;
                    ctx.lineWidth = parseInt(sizeInput.value);
                    ctx.lineCap = 'round'; });
                canvas.addEventListener('pointermove', (e) => {
                    if (!drawing) return;
                    ctx.lineTo(e.offsetX, e.offsetY);
                    ctx.stroke();
                });
                canvas.addEventListener('pointerup', () => { drawing = false; });
                canvas.addEventListener('pointerleave', () => { drawing = false; });
                clearBtn.addEventListener('click', () => { ctx.fillStyle = '#fff';
                    ctx.fillRect(0, 0, canvas.width, canvas.height); });
            }

            // ==================== CONTEXT MENU ====================
            function showContextMenu(x, y, items) {
                const menu = document.getElementById('context-menu');
                menu.innerHTML = items.map((item, i) => {
                    if (item.separator) return '<div class="cm-separator"></div>';
                    return `<div class="cm-item" data-idx="${i}">${item.icon||''} ${item.label}<span class="cm-shortcut">${item.shortcut||''}</span></div>`;
                }).join('');
                menu.style.display = 'block';
                menu.style.left = Math.min(x, window.innerWidth - 220) + 'px';
                menu.style.top = Math.min(y, window.innerHeight - items.length * 36 - 20) + 'px';
                menu.querySelectorAll('.cm-item').forEach(el => {
                    el.addEventListener('click', () => {
                        const idx = parseInt(el.dataset.idx);
                        if (items[idx] && items[idx].action) items[idx].action();
                        menu.style.display = 'none';
                    });
                });
                const closeMenu = (e) => {
                    if (!menu.contains(e.target)) { menu.style.display = 'none';
                        document.removeEventListener('click', closeMenu);
                        document.removeEventListener('contextmenu', closeMenu); }
                };
                setTimeout(() => { document.addEventListener('click', closeMenu);
                    document.addEventListener('contextmenu', closeMenu); }, 10);
            }

            // ==================== START MENU ====================
            function renderStartMenu() {
                const content = document.getElementById('start-menu-content');
                const allApps = [
                    ...desktopIcons.map(d => ({ label: d.label, icon: d.icon, action: d.action })),
                    { label: 'Task Manager', icon: '📋', action: () => openApp('systemmonitor', 'Task Manager', '📋') },
                ];
                const filter = (document.getElementById('start-search-input')?.value || '').toLowerCase();
                const filtered = allApps.filter(a => a.label.toLowerCase().includes(filter));
                content.innerHTML = filtered.map(a =>
                    `<div class="sm-app-item"><span class="sm-app-icon">${a.icon}</span>${a.label}</div>`
                ).join('');
                content.querySelectorAll('.sm-app-item').forEach((el, i) => {
                    el.addEventListener('click', () => { if (filtered[i]) filtered[i].action();
                        toggleStartMenu(false); });
                });
            }

            function toggleStartMenu(show) {
                const menu = document.getElementById('start-menu');
                const isOpen = menu.classList.contains('open');
                if (show === undefined) show = !isOpen;
                if (show) { menu.classList.add('open');
                    renderStartMenu();
                    document.getElementById('start-search-input').focus(); } else menu.classList.remove('open');
            }
            document.getElementById('start-btn').addEventListener('click', (e) => { e.stopPropagation();
                toggleStartMenu(); });
            document.getElementById('start-search-input')?.addEventListener('input', renderStartMenu);
            document.getElementById('sm-settings-btn')?.addEventListener('click', () => { openApp('settings', 'Settings',
                    '⚙️');
                toggleStartMenu(false); });
            document.getElementById('sm-explorer-btn')?.addEventListener('click', () => { openApp('fileexplorer',
                    'File Explorer', '📁');
                toggleStartMenu(false); });
            document.getElementById('sm-power-btn')?.addEventListener('click', () => {
                toggleStartMenu(false);
                showModal('Shutdown', 'Are you sure you want to shut down AetherOS?', [
                    { label: 'Cancel', cls: 'btn-secondary' },
                    {
                        label: 'Shutdown',
                        cls: 'btn-primary',
                        action: () => { document.getElementById('login-overlay').classList.remove('hidden');
                            document.getElementById('login-password').value = '';
                            document.getElementById('login-password').focus(); }
                    },
                ]);
            });

            // ==================== MODAL SYSTEM ====================
            function showModal(title, message, buttons) {
                const container = document.getElementById('modal-container');
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.innerHTML = `
              <div class="modal-dialog">
                <h3>${title}</h3>
                <p>${message}</p>
                <div class="modal-actions">${buttons.map((b,i)=>`<button class="${b.cls||'btn-secondary'}" data-idx="${i}">${b.label}</button>`).join('')}</div>
              </div>`;
                container.appendChild(overlay);
                overlay.querySelectorAll('button').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const idx = parseInt(btn.dataset.idx);
                        if (buttons[idx] && buttons[idx].action) buttons[idx].action();
                        overlay.remove();
                    });
                });
                overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
            }

            // ==================== TASKBAR UPDATE ====================
            function updateTaskbar() {
                const tasksContainer = document.getElementById('taskbar-tasks');
                const windows = windowManager.listWindows();
                tasksContainer.innerHTML = windows.map(w => {
                    const isActive = windowManager.focusedWid === w.wid && w.state !== 'minimized';
                    return `<button class="tb-task${isActive?' active':''}" data-wid="${w.wid}" title="${w.title}">
                <span class="tb-task-icon">${w.icon}</span>
                <span class="tb-task-label">${w.title}</span>
              </button>`;
                }).join('');
                tasksContainer.querySelectorAll('.tb-task').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const wid = parseInt(btn.dataset.wid);
                        windowManager.focusOrRestore(wid);
                    });
                });
            }
            eventBus.on('taskbar:update', updateTaskbar);
            eventBus.on('window:created', updateTaskbar);
            eventBus.on('window:closed', updateTaskbar);
            eventBus.on('window:minimized', updateTaskbar);
            eventBus.on('window:focused', updateTaskbar);

            // ==================== GLOBAL EVENTS ====================
            document.addEventListener('click', (e) => {
                const menu = document.getElementById('start-menu');
                if (menu.classList.contains('open') && !menu.contains(e.target) && e.target.id !== 'start-btn') {
                    toggleStartMenu(false);
                }
                const ctxMenu = document.getElementById('context-menu');
                if (ctxMenu.style.display === 'block' && !ctxMenu.contains(e.target)) {
                    ctxMenu.style.display = 'none';
                }
            });
            document.addEventListener('contextmenu', (e) => {
                if (e.target.closest('.window') || e.target.closest('#taskbar') || e.target.closest('#start-menu'))
                    return;
                e.preventDefault();
                showContextMenu(e.clientX, e.clientY, [
                    { label: 'Refresh', icon: '🔄', action: () => renderDesktopIcons() },
                    { label: 'New Folder', icon: '📁', action: async () => { const name = prompt('Folder name:',
                                'New Folder'); if (name) await vfs.createDir('/Desktop/' + name);
                            notifications.show('Created', name, 'success'); } },
                    { separator: true },
                    { label: 'Display Settings', icon: '🖥️', action: () => openApp('settings', 'Settings',
                            '⚙️') },
                    { label: 'Personalize', icon: '🎨', action: () => { themeManager.cycle();
                            notifications.show('Theme', 'Changed to ' + themeManager.current,
                                'info'); } },
                ]);
            });
            // Desktop icon selection box
            (function() {
                const desktop = document.getElementById('desktop');
                const selBox = document.getElementById('selection-box');
                let selecting = false,
                    startX, startY;
                desktop.addEventListener('pointerdown', (e) => {
                    if (e.target.closest('.desktop-icon') || e.target.closest('.window') || e.target.closest(
                            '#desktop-icons') === null && e.target !== desktop) return;
                    if (e.target === desktop || e.target.id === 'desktop-icons') {
                        selecting = true;
                        startX = e.clientX;
                        startY = e.clientY;
                        selBox.style.display = 'block';
                        selBox.style.left = startX + 'px';
                        selBox.style.top = startY + 'px';
                        selBox.style.width = '0px';
                        selBox.style.height = '0px';
                        document.querySelectorAll('.desktop-icon.selected').forEach(s => s.classList.remove(
                            'selected'));
                    }
                });
                document.addEventListener('pointermove', (e) => {
                    if (!selecting) return;
                    const x = Math.min(startX, e.clientX);
                    const y = Math.min(startY, e.clientY);
                    const w = Math.abs(e.clientX - startX);
                    const h = Math.abs(e.clientY - startY);
                    selBox.style.left = x + 'px';
                    selBox.style.top = y + 'px';
                    selBox.style.width = w + 'px';
                    selBox.style.height = h + 'px';
                });
                document.addEventListener('pointerup', () => {
                    if (selecting) {
                        selecting = false;
                        selBox.style.display = 'none';
                        const boxRect = selBox.getBoundingClientRect();
                        document.querySelectorAll('.desktop-icon').forEach(icon => {
                            const ir = icon.getBoundingClientRect();
                            if (ir.left < boxRect.right && ir.right > boxRect.left && ir.top < boxRect
                                .bottom && ir.bottom > boxRect.top) {
                                icon.classList.add('selected');
                            }
                        });
                    }
                });
            })();

            // ==================== LOGIN SYSTEM ====================
            const loginOverlay = document.getElementById('login-overlay');
            const loginPassword = document.getElementById('login-password');
            const loginSubmit = document.getElementById('login-submit');
            loginSubmit.addEventListener('click', () => {
                if (loginPassword.value === 'admin') {
                    loginOverlay.classList.add('hidden');
                    notifications.show('Welcome', 'Logged in successfully!', 'success');
                    procManager.create('Session Manager', 'service');
                    procManager.create('Desktop Environment', 'service');
                } else {
                    notifications.show('Login Failed', 'Incorrect password. Try "admin"', 'error');
                    loginPassword.value = '';
                }
            });
            loginPassword.addEventListener('keydown', (e) => { if (e.key === 'Enter') loginSubmit.click(); });

            // ==================== GLOBAL KEYBOARD SHORTCUTS ====================
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === 'k') { e.preventDefault();
                    document.getElementById('start-btn').click(); }
                if (e.ctrlKey && e.key === 't') { e.preventDefault();
                    openApp('terminal', 'Terminal', '💻'); }
                if (e.ctrlKey && e.key === 'n') { e.preventDefault();
                    openApp('notes', 'Notes', '📝'); }
                if (e.ctrlKey && e.key === 'e') { e.preventDefault();
                    openApp('fileexplorer', 'File Explorer', '📁'); }
                if (e.altKey && e.key === 'F4') { e.preventDefault(); if (windowManager.focusedWid) windowManager
                        .close(windowManager.focusedWid); }
            });

            // ==================== NOTIFICATION BUTTON ====================
            document.getElementById('notif-btn').addEventListener('click', () => {
                notifications.show('Notifications', `You have ${notifications.count} notification(s)`, 'info');
            });

            // ==================== ACTION CENTER ====================
            document.getElementById('action-center-btn').addEventListener('click', () => {
                const msgs = [
                    'System is running smoothly ✅',
                    'All processes nominal 📊',
                    'Storage: ' + (Math.random() * 400 + 100).toFixed(0) + ' MB free 💾',
                    'No updates available 🔄',
                ];
                notifications.show('Action Center', msgs[Math.floor(Math.random() * msgs.length)], 'info');
            });

            // ==================== CLOCK CLICK ====================
            document.getElementById('clock-display').addEventListener('click', () => {
                notifications.show('Date & Time', new Date().toLocaleString(), 'info', 5000);
            });

            // ==================== SEARCH BUTTON ====================
            document.getElementById('search-btn').addEventListener('click', () => {
                toggleStartMenu(true);
                setTimeout(() => document.getElementById('start-search-input')?.focus(), 100);
            });

            // ==================== INITIALIZATION ====================
            async function init() {
                await vfs.dbReady;
                procManager.create('Kernel', 'kernel');
                procManager.create('Init', 'service');
                updateTaskbar();
                renderStartMenu();
                // Auto-start some apps for demo
                setTimeout(() => {
                    openApp('fileexplorer', 'File Explorer', '📁');
                    setTimeout(() => openApp('terminal', 'Terminal', '💻'), 400);
                }, 600);
                console.log('%c🚀 AetherOS %cv2.0 %cready',
                    'font-size:1.4em;font-weight:bold;color:#5b9bd5;',
                    'color:#7b68ee;',
                    'color:#888;');
                console.log('%c🔑 Default password: admin', 'color:#e0a040;');
                console.log('%c💡 Try: Ctrl+K (Start Menu) | Ctrl+T (Terminal) | Ctrl+N (Notes) | Ctrl+E (Explorer)',
                    'color:#4caf84;');
            }
            init().catch(console.error);

            // ==================== EXPORT FOR DEBUG ====================
            window.__aetheros = {
                vfs,
                procManager,
                windowManager,
                notifications,
                themeManager,
                eventBus,
                openApp,
                toggleStartMenu,
                showContextMenu,
                showModal,
                appRegistry,
            };

            console.log('%c📋 API exposed at window.__aetheros', 'color:#888;font-size:0.8em;');
        })();
    </script>
