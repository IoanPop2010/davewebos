<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetherOS - Browser Operating System</title>
    <meta name="description" content="AetherOS - Advanced Browser-Based Operating System Simulation">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="manifest" href="data:application/json,{}">

    <!-- ==================== CSS VARIABLES & RESET ==================== -->
    <style>
        :root {
            /* Core palette */
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-tertiary: #0f3460;
            --surface-primary: #1e1e32;
            --surface-secondary: #252540;
            --surface-glass: rgba(30, 30, 50, 0.75);
            --surface-glass-heavy: rgba(20, 20, 40, 0.9);
            --text-primary: #e0e0f0;
            --text-secondary: #a0a0c0;
            --text-muted: #707090;
            --accent-primary: #5b9bd5;
            --accent-secondary: #7b68ee;
            --accent-success: #4caf84;
            --accent-warning: #e0a040;
            --accent-danger: #e05555;
            --accent-info: #4db8d8;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --border-medium: rgba(255, 255, 255, 0.14);
            --border-strong: rgba(255, 255, 255, 0.22);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.5);
            --shadow-xl: 0 16px 60px rgba(0, 0, 0, 0.6);
            --shadow-glow: 0 0 30px rgba(91, 155, 213, 0.3);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --radius-xl: 22px;
            --radius-full: 9999px;
            --font-sans: 'Segoe UI', 'Inter', 'SF Pro Display', system-ui, sans-serif;
            --font-mono: 'Cascadia Code', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            --font-size-xs: 0.7rem;
            --font-size-sm: 0.8rem;
            --font-size-md: 0.9rem;
            --font-size-lg: 1rem;
            --font-size-xl: 1.15rem;
            --font-size-2xl: 1.4rem;
            --font-size-3xl: 1.8rem;
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 14px;
            --spacing-lg: 22px;
            --spacing-xl: 32px;
            --taskbar-height: 48px;
            --titlebar-height: 36px;
            --transition-fast: 0.12s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-normal: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --backdrop-blur: blur(18px) saturate(140%);
            --backdrop-blur-heavy: blur(30px) saturate(160%);
            --glass-border: 1px solid rgba(255, 255, 255, 0.1);
            --glass-highlight: rgba(255, 255, 255, 0.05);
        }

        [data-theme="light"] {
            --bg-primary: #f0f2f5;
            --bg-secondary: #e8ecf1;
            --bg-tertiary: #dde2e8;
            --surface-primary: #ffffff;
            --surface-secondary: #f7f8fa;
            --surface-glass: rgba(255, 255, 255, 0.8);
            --surface-glass-heavy: rgba(255, 255, 255, 0.94);
            --text-primary: #1a1d28;
            --text-secondary: #4a5060;
            --text-muted: #8890a0;
            --border-subtle: rgba(0, 0, 0, 0.06);
            --border-medium: rgba(0, 0, 0, 0.1);
            --border-strong: rgba(0, 0, 0, 0.18);
            --shadow-sm: 0 2px 6px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.14);
            --shadow-xl: 0 14px 48px rgba(0, 0, 0, 0.18);
            --shadow-glow: 0 0 24px rgba(91, 155, 213, 0.2);
        }

        [data-theme="cyberpunk"] {
            --bg-primary: #0a0010;
            --bg-secondary: #120020;
            --bg-tertiary: #1a0035;
            --surface-primary: #150028;
            --surface-secondary: #1d0035;
            --surface-glass: rgba(20, 0, 40, 0.8);
            --surface-glass-heavy: rgba(10, 0, 20, 0.94);
            --text-primary: #e0d0ff;
            --text-secondary: #c0a0f0;
            --text-muted: #8060b0;
            --accent-primary: #d040ff;
            --accent-secondary: #00e0ff;
            --accent-success: #00ff88;
            --accent-warning: #ffaa00;
            --accent-danger: #ff2266;
            --accent-info: #00ccff;
            --border-subtle: rgba(200, 100, 255, 0.15);
            --border-medium: rgba(200, 100, 255, 0.25);
            --border-strong: rgba(200, 100, 255, 0.4);
            --shadow-glow: 0 0 30px rgba(200, 0, 255, 0.4);
        }

        [data-theme="ubuntu"] {
            --bg-primary: #2c001e;
            --bg-secondary: #3a0028;
            --bg-tertiary: #4a0035;
            --surface-primary: #350020;
            --surface-secondary: #400028;
            --surface-glass: rgba(50, 0, 30, 0.8);
            --accent-primary: #e95420;
            --accent-secondary: #f0772e;
            --accent-success: #38b44a;
            --accent-warning: #f99b11;
            --accent-danger: #df382c;
            --accent-info: #17a2b8;
            --shadow-glow: 0 0 24px rgba(233, 84, 32, 0.3);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            font-size: 15px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            height: 100%;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            transition: background var(--transition-normal), color var(--transition-normal);
            cursor: default;
            line-height: 1.5;
        }
        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            background: none;
            color: inherit;
            font-size: inherit;
            outline: none;
        }
        button:focus-visible,
        a:focus-visible,
        [tabindex]:focus-visible {
            outline: 2px solid var(--accent-primary);
            outline-offset: 2px;
            border-radius: var(--radius-sm);
        }
        input,
        textarea,
        select {
            font-family: inherit;
            font-size: inherit;
            color: var(--text-primary);
            background: var(--surface-secondary);
            border: 1px solid var(--border-medium);
            border-radius: var(--radius-sm);
            padding: var(--spacing-xs) var(--spacing-sm);
            outline: none;
            transition: border var(--transition-fast);
        }
        input:focus,
        textarea:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(91, 155, 213, 0.15);
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-strong);
            border-radius: var(--radius-full);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>

    <!-- ==================== DESKTOP & LAYOUT STYLES ==================== -->
    <style>
        #desktop {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: var(--bg-primary);
            background-image: radial-gradient(ellipse at 30% 20%, rgba(91, 155, 213, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 60%, rgba(123, 104, 238, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(76, 175, 132, 0.04) 0%, transparent 40%);
            z-index: 0;
        }
        #desktop-icons {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            padding: var(--spacing-lg);
            display: grid;
            grid-template-columns: repeat(auto-fill, 90px);
            grid-auto-rows: 100px;
            gap: var(--spacing-sm);
            align-content: start;
            z-index: 1;
            pointer-events: none;
        }
        #desktop-icons>* {
            pointer-events: auto;
        }
        .desktop-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-sm);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: background var(--transition-fast), transform var(--transition-fast);
            text-align: center;
            gap: 4px;
            width: 90px;
            height: 90px;
            position: relative;
        }
        .desktop-icon:hover {
            background: var(--glass-highlight);
            transform: translateY(-2px);
        }
        .desktop-icon:active {
            transform: scale(0.94);
        }
        .desktop-icon.selected {
            background: rgba(91, 155, 213, 0.25);
            border: 1px solid var(--accent-primary);
        }
        .desktop-icon .icon-img {
            font-size: 2.4rem;
            line-height: 1;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
            transition: filter var(--transition-fast);
        }
        .desktop-icon .icon-label {
            font-size: var(--font-size-xs);
            color: var(--text-primary);
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
            word-break: break-word;
            max-width: 80px;
            line-height: 1.2;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        #selection-box {
            position: absolute;
            border: 2px dashed var(--accent-primary);
            background: rgba(91, 155, 213, 0.12);
            border-radius: var(--radius-sm);
            pointer-events: none;
            z-index: 10;
            display: none;
        }
        #windows-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 5;
        }
        #windows-container>* {
            pointer-events: auto;
        }
    </style>

    <!-- ==================== TASKBAR STYLES ==================== -->
    <style>
        #taskbar {
            height: var(--taskbar-height);
            background: var(--surface-glass-heavy);
            backdrop-filter: var(--backdrop-blur-heavy);
            -webkit-backdrop-filter: var(--backdrop-blur-heavy);
            border-top: var(--glass-border);
            display: flex;
            align-items: center;
            padding: 0 var(--spacing-sm);
            gap: 4px;
            z-index: 100;
            position: relative;
            box-shadow: var(--shadow-lg);
            transition: background var(--transition-normal);
        }
        #taskbar .tb-section {
            display: flex;
            align-items: center;
            gap: 4px;
            height: 100%;
        }
        #taskbar .tb-center {
            flex: 1;
            justify-content: center;
            overflow-x: auto;
            overflow-y: hidden;
            gap: 2px;
            padding: 0 var(--spacing-sm);
            scrollbar-width: none;
        }
        #taskbar .tb-center::-webkit-scrollbar {
            display: none;
        }
        #taskbar .tb-right {
            margin-left: auto;
            gap: 2px;
        }
        .tb-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            transition: background var(--transition-fast);
            font-size: 1.2rem;
            position: relative;
        }
        .tb-btn:hover {
            background: var(--glass-highlight);
        }
        .tb-btn:active {
            transform: scale(0.92);
        }
        .tb-btn.start-btn {
            font-size: 1.5rem;
            width: 44px;
        }
        .tb-task {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: var(--radius-md);
            font-size: var(--font-size-sm);
            white-space: nowrap;
            cursor: pointer;
            transition: all var(--transition-fast);
            background: transparent;
            border: 1px solid transparent;
            min-width: 40px;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            height: 38px;
        }
        .tb-task:hover {
            background: var(--glass-highlight);
        }
        .tb-task.active {
            background: rgba(91, 155, 213, 0.25);
            border-color: var(--accent-primary);
            box-shadow: var(--shadow-glow);
        }
        .tb-task .tb-task-icon {
            font-size: 1.1rem;
            flex-shrink: 0;
        }
        .tb-task .tb-task-label {
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: var(--font-size-xs);
        }
        #clock-display {
            font-size: var(--font-size-sm);
            padding: 4px 10px;
            cursor: pointer;
            border-radius: var(--radius-md);
            text-align: right;
            line-height: 1.3;
            transition: background var(--transition-fast);
            white-space: nowrap;
        }
        #clock-display:hover {
            background: var(--glass-highlight);
        }
        #clock-display .clock-time {
            font-weight: 600;
            font-size: var(--font-size-md);
        }
        #clock-display .clock-date {
            font-size: var(--font-size-xs);
            color: var(--text-secondary);
        }
    </style>

    <!-- ==================== START MENU STYLES ==================== -->
    <style>
        #start-menu {
            position: absolute;
            bottom: calc(var(--taskbar-height) + 8px);
            left: 10px;
            width: 420px;
            max-height: 600px;
            background: var(--surface-glass-heavy);
            backdrop-filter: var(--backdrop-blur-heavy);
            -webkit-backdrop-filter: var(--backdrop-blur-heavy);
            border: var(--glass-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            z-index: 200;
            display: none;
            flex-direction: column;
            overflow: hidden;
            animation: menuSlideUp var(--transition-slow) ease-out;
        }
        #start-menu.open {
            display: flex;
        }
        @keyframes menuSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        #start-menu .sm-search {
            padding: var(--spacing-md);
            border-bottom: var(--glass-border);
        }
        #start-menu .sm-search input {
            width: 100%;
            padding: 10px 16px;
            border-radius: var(--radius-full);
            font-size: var(--font-size-md);
            background: var(--surface-secondary);
            border: 1px solid var(--border-medium);
            color: var(--text-primary);
            transition: all var(--transition-fast);
        }
        #start-menu .sm-search input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px rgba(91, 155, 213, 0.1);
        }
        #start-menu .sm-content {
            flex: 1;
            overflow-y: auto;
            padding: var(--spacing-sm);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-sm);
        }
        #start-menu .sm-app-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-fast);
            font-size: var(--font-size-sm);
        }
        #start-menu .sm-app-item:hover {
            background: var(--glass-highlight);
            transform: translateX(2px);
        }
        #start-menu .sm-app-item .sm-app-icon {
            font-size: 1.6rem;
            width: 36px;
            text-align: center;
            flex-shrink: 0;
        }
        #start-menu .sm-footer {
            display: flex;
            align-items: center;
            padding: var(--spacing-sm) var(--spacing-md);
            border-top: var(--glass-border);
            gap: var(--spacing-sm);
        }
        #start-menu .sm-footer button {
            padding: 8px 16px;
            border-radius: var(--radius-md);
            font-size: var(--font-size-sm);
            transition: all var(--transition-fast);
        }
        #start-menu .sm-footer button:hover {
            background: var(--glass-highlight);
        }
        #start-menu .sm-footer .power-btn {
            margin-left: auto;
            color: var(--accent-danger);
            font-size: 1.3rem;
        }
    </style>

    <!-- ==================== WINDOW STYLES ==================== -->
    <style>
        .window {
            position: absolute;
            min-width: 300px;
            min-height: 200px;
            background: var(--surface-glass);
            backdrop-filter: var(--backdrop-blur);
            -webkit-backdrop-filter: var(--backdrop-blur);
            border: var(--glass-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: box-shadow var(--transition-normal), border-color var(--transition-fast);
            animation: windowOpen var(--transition-slow) ease-out;
            will-change: transform, width, height;
        }
        @keyframes windowOpen {
            from {
                opacity: 0;
                transform: scale(0.85);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        @keyframes windowClose {
            from {
                opacity: 1;
                transform: scale(1);
            }
            to {
                opacity: 0;
                transform: scale(0.85);
            }
        }
        .window.closing {
            animation: windowClose var(--transition-fast) ease-in forwards;
            pointer-events: none;
        }
        .window.focused {
            border-color: var(--accent-primary);
            box-shadow: var(--shadow-xl), var(--shadow-glow);
            z-index: 50 !important;
        }
        .window.maximized {
            border-radius: 0;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: calc(100% - var(--taskbar-height)) !important;
            animation: none;
        }
        .window.minimized {
            opacity: 0;
            transform: translateY(40px) scale(0.8);
            pointer-events: none;
            transition: all var(--transition-normal);
        }
        .window .titlebar {
            display: flex;
            align-items: center;
            height: var(--titlebar-height);
            padding: 0 var(--spacing-sm);
            gap: 8px;
            cursor: move;
            flex-shrink: 0;
            background: var(--surface-glass-heavy);
            border-bottom: var(--glass-border);
        }
        .window .titlebar .tb-icon {
            font-size: 1rem;
            flex-shrink: 0;
        }
        .window .titlebar .tb-title {
            flex: 1;
            font-size: var(--font-size-sm);
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text-secondary);
        }
        .window .titlebar .tb-controls {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }
        .window .titlebar .tb-controls button {
            width: 28px;
            height: 28px;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            transition: all var(--transition-fast);
            color: var(--text-secondary);
        }
        .window .titlebar .tb-controls button:hover {
            background: var(--glass-highlight);
            color: var(--text-primary);
        }
        .window .titlebar .tb-controls .close-btn:hover {
            background: var(--accent-danger);
            color: #fff;
        }
        .window .window-content {
            flex: 1;
            overflow: auto;
            position: relative;
            background: transparent;
        }
        .window .window-content iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .resize-handle {
            position: absolute;
            z-index: 60;
        }
        .resize-handle.nw {
            top: -4px;
            left: -4px;
            width: 14px;
            height: 14px;
            cursor: nw-resize;
        }
        .resize-handle.ne {
            top: -4px;
            right: -4px;
            width: 14px;
            height: 14px;
            cursor: ne-resize;
        }
        .resize-handle.sw {
            bottom: -4px;
            left: -4px;
            width: 14px;
            height: 14px;
            cursor: sw-resize;
        }
        .resize-handle.se {
            bottom: -4px;
            right: -4px;
            width: 14px;
            height: 14px;
            cursor: se-resize;
        }
        .resize-handle.n {
            top: -4px;
            left: 14px;
            right: 14px;
            height: 10px;
            cursor: n-resize;
        }
        .resize-handle.s {
            bottom: -4px;
            left: 14px;
            right: 14px;
            height: 10px;
            cursor: s-resize;
        }
        .resize-handle.e {
            right: -4px;
            top: 14px;
            bottom: 14px;
            width: 10px;
            cursor: e-resize;
        }
        .resize-handle.w {
            left: -4px;
            top: 14px;
            bottom: 14px;
            width: 10px;
            cursor: w-resize;
        }
    </style>

    <!-- ==================== NOTIFICATION STYLES ==================== -->
    <style>
        #notification-container {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 300;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        #notification-container>* {
            pointer-events: auto;
        }
        .notification-toast {
            background: var(--surface-glass-heavy);
            backdrop-filter: var(--backdrop-blur-heavy);
            -webkit-backdrop-filter: var(--backdrop-blur-heavy);
            border: var(--glass-border);
            border-radius: var(--radius-md);
            padding: 14px 18px;
            box-shadow: var(--shadow-lg);
            min-width: 300px;
            max-width: 420px;
            animation: toastSlideIn var(--transition-slow) ease-out;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            transition: all var(--transition-normal);
        }
        .notification-toast.removing {
            animation: toastSlideOut var(--transition-normal) ease-in forwards;
        }
        @keyframes toastSlideIn {
            from {
                opacity: 0;
                transform: translateX(60px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        @keyframes toastSlideOut {
            from {
                opacity: 1;
                transform: translateX(0);
            }
            to {
                opacity: 0;
                transform: translateX(60px);
            }
        }
        .notification-toast .toast-icon {
            font-size: 1.5rem;
            flex-shrink: 0;
        }
        .notification-toast .toast-body {
            flex: 1;
            font-size: var(--font-size-sm);
        }
        .notification-toast .toast-title {
            font-weight: 600;
            margin-bottom: 2px;

    <!-- ==================== MAIN JAVASCRIPT ==================== -->
    <script>
        (function() {
            'use strict';

            // ==================== KERNEL / EVENT BUS ====================
            class EventBus {
                constructor() { this._listeners = new Map(); }
                on(event, callback, priority = 0) {
                    if (!this._listeners.has(event)) this._listeners.set(event, []);
                    this._listeners.get(event).push({ callback, priority });
                    this._listeners.get(event).sort((a, b) => b.priority - a.priority);
                    return () => this.off(event, callback);
                }
                off(event, callback) {
                    if (!this._listeners.has(event)) return;
                    const arr = this._listeners.get(event);
                    const idx = arr.findIndex(l => l.callback === callback);
                    if (idx >= 0) arr.splice(idx, 1);
                }
                emit(event, ...args) {
                    if (!this._listeners.has(event)) return;
                    for (const l of [...this._listeners.get(event)]) {
                        try { l.callback(...args); } catch (e) { console.error(`[EventBus] Error in ${event}:`, e); }
                    }
                }
                once(event, callback) {
                    const wrapper = (...args) => { this.off(event, wrapper);
                        callback(...args); };
                    return this.on(event, wrapper);
                }
            }
            const eventBus = new EventBus();

            // ==================== VIRTUAL FILESYSTEM ====================
            class VirtualFileSystem {
                constructor() {
                    this.db = null;
                    this.dbReady = this._initDB();
                    this.currentPath = '/';
                    this.clipboard = null;
                    this.clipboardOp = null;
                }
                async _initDB() {
                    return new Promise((resolve, reject) => {
                        const req = indexedDB.open('AetherOS_FS', 2);
                        req.onupgradeneeded = (e) => {
                            const db = e.target.result;
                            if (!db.objectStoreNames.contains('nodes')) {
                                const store = db.createObjectStore('nodes', { keyPath: 'path' });
                                store.createIndex('parent', 'parent', { unique: false });
                                store.createIndex('type', 'type', { unique: false });
                            }
                        };
                        req.onsuccess = (e) => {
                            this.db = e.target.result;
                            this._seedFilesystem().then(resolve).catch(resolve);
                        };
                        req.onerror = () => {
                            console.warn('[VFS] IndexedDB unavailable, using memory fallback');
                            this._memoryFallback = new Map();
                            this._seedMemoryFS();
                            resolve();
                        };
                    });
                }
                _memoryFallback = null;
                _seedMemoryFS() {
                    const defaults = [
                        { path: '/', type: 'directory', parent: null, created: Date.now(), modified: Date.now(),
                            size: 0 },
                        { path: '/Desktop', type: 'directory', parent: '/', created: Date.now(), modified: Date.now(),
                            size: 0 },
                        { path: '/Documents', type: 'directory', parent: '/', created: Date.now(), modified: Date.now(),
                            size: 0 },
                        { path: '/Downloads', type: 'directory', parent: '/', created: Date.now(), modified: Date.now(),
                            size: 0 },
                        { path: '/Pictures', type: 'directory', parent: '/', created: Date.now(), modified: Date.now(),
                            size: 0 },
                        { path: '/Music', type: 'directory', parent: '/', created: Date.now(), modified: Date.now(),
                            size: 0 },
                        { path: '/Videos', type: 'directory', parent: '/', created: Date.now(), modified: Date.now(),
                            size: 0 },
                        { path: '/System', type: 'directory', parent: '/', created: Date.now(), modified: Date.now(),
                            size: 0 },
                        { path: '/Temp', type: 'directory', parent: '/', created: Date.now(), modified: Date.now(),
                            size: 0 },
                        { path: '/Desktop/README.txt', type: 'file', parent: '/Desktop', created: Date.now(),
                            modified: Date.now(), size: 120, content: 'Welcome to AetherOS! This is a virtual file.' },
                        { path: '/Documents/Notes.txt', type: 'file', parent: '/Documents', created: Date.now(),
                            modified: Date.now(), size: 50, content: 'My notes...' },
                    ];
                    defaults.forEach(d => this._memoryFallback.set(d.path, d));
                }
                async _seedFilesystem() {
                    const existing = await this._dbGet('/');
                    if (!existing) {
                        const defaults = [
                            { path: '/', type: 'directory', parent: null, created: Date.now(), modified: Date.now(),
                                size: 0 },
                            { path: '/Desktop', type: 'directory', parent: '/', created: Date.now(), modified: Date
                                    .now(), size: 0 },
                            { path: '/Documents', type: 'directory', parent: '/', created: Date.now(), modified: Date
                                    .now(), size: 0 },
                            { path: '/Downloads', type: 'directory', parent: '/', created: Date.now(), modified: Date
                                    .now(), size: 0 },
                            { path: '/Pictures', type: 'directory', parent: '/', created: Date.now(), modified: Date
                                    .now(), size: 0 },
                            { path: '/Music', type: 'directory', parent: '/', created: Date.now(), modified: Date.now(),
                                size: 0 },
                            { path: '/Videos', type: 'directory', parent: '/', created: Date.now(), modified: Date.now(),
                                size: 0 },
                            { path: '/System', type: 'directory', parent: '/', created: Date.now(), modified: Date.now(),
                                size: 0 },
                            { path: '/Temp', type: 'directory', parent: '/', created: Date.now(), modified: Date.now(),
                                size: 0 },
                            { path: '/Desktop/Welcome.txt', type: 'file', parent: '/Desktop', created: Date.now(),
                                modified: Date.now(), size: 42, content: 'Welcome to AetherOS! 🚀' },
                        ];
                        for (const d of defaults) await this._dbPut(d);
                    }
                }
                async _dbGet(path) {
                    if (this._memoryFallback) return this._memoryFallback.get(path) || null;
                    return new Promise(r => {
                        const tx = this.db.transaction('nodes', 'readonly');
                        const req = tx.objectStore('nodes').get(path);
                        req.onsuccess = () => r(req.result || null);
                        req.onerror = () => r(null);
                    });
                }
                async _dbPut(node) {
                    if (this._memoryFallback) { this._memoryFallback.set(node.path, node); return; }
                    return new Promise(r => {
                        const tx = this.db.transaction('nodes', 'readwrite');
                        tx.objectStore('nodes').put(node);
                        tx.oncomplete = () => r();
                        tx.onerror = () => r();
                    });
                }
                async _dbDelete(path) {
                    if (this._memoryFallback) { this._memoryFallback.delete(path); return; }
                    return new Promise(r => {
                        const tx = this.db.transaction('nodes', 'readwrite');
                        tx.objectStore('nodes').delete(path);
                        tx.oncomplete = () => r();
                        tx.onerror = () => r();
                    });
                }
                async _dbGetAll() {
                    if (this._memoryFallback) return [...this._memoryFallback.values()];
                    return new Promise(r => {
                        const tx = this.db.transaction('nodes', 'readonly');
                        const req = tx.objectStore('nodes').getAll();
                        req.onsuccess = () => r(req.result || []);
                        req.onerror = () => r([]);
                    });
                }
                async listDir(path) {
                    await this.dbReady;
                    const all = await this._dbGetAll();
                    const normalized = path.endsWith('/') ? path : path + '/';
                    return all.filter(n => n.parent === path || (n.parent === normalized.slice(0, -1) && n.path !==
                        path));
                }
                async getNode(path) { await this.dbReady; return this._dbGet(path); }
                async createFile(path, content = '') {
                    await this.dbReady;
                    const parent = path.substring(0, path.lastIndexOf('/')) || '/';
                    await this._dbPut({ path, type: 'file', parent, created: Date.now(), modified: Date.now(), size: content
                            .length, content });
                    eventBus.emit('fs:changed', { action: 'create', path });
                }
                async createDir(path) {
                    await this.dbReady;
                    const parent = path.substring(0, path.lastIndexOf('/')) || '/';
                    await this._dbPut({ path, type: 'directory', parent, created: Date.now(), modified: Date.now(), size: 0 });
                    eventBus.emit('fs:changed', { action: 'create', path });
                }
                async deleteNode(path) {
                    await this.dbReady;
                    const node = await this._dbGet(path);
                    if (!node) return;
                    if (node.type === 'directory') {
                        const all = await this._dbGetAll();
                        const children = all.filter(n => n.path.startsWith(path + '/') || n.path === path);
                        for (const c of children) await this._dbDelete(c.path);
                    } else {
                        await this._dbDelete(path);
                    }
                    eventBus.emit('fs:changed', { action: 'delete', path });
                }
                async renameNode(oldPath, newPath) {
                    await this.dbReady;
                    const node = await this._dbGet(oldPath);
                    if (!node) return;
                    await this._dbDelete(oldPath);
                    node.path = newPath;
                    node.parent = newPath.substring(0, newPath.lastIndexOf('/')) || '/';
                    node.modified = Date.now();
                    await this._dbPut(node);
                    if (node.type === 'directory') {
                        const all = await this._dbGetAll();
                        const children = all.filter(n => n.path.startsWith(oldPath + '/'));
                        for (const c of children) {
                            const newChildPath = newPath + c.path.substring(oldPath.length);
                            await this._dbDelete(c.path);
                            c.path = newChildPath;
                            c.parent = newChildPath.substring(0, newChildPath.lastIndexOf('/')) || '/';
                            await this._dbPut(c);
                        }
                    }
                    eventBus.emit('fs:changed', { action: 'rename', oldPath, newPath });
                }
                async readFile(path) {
                    const node = await this.getNode(path);
                    return node ? (node.content || '') : null;
                }
                async writeFile(path, content) {
                    const node = await this.getNode(path);
                    if (node) {
                        node.content = content;
                        node.size = content.length;
                        node.modified = Date.now();
                        await this._dbPut(node);
                    } else {
                        await this.createFile(path, content);
                    }
                    eventBus.emit('fs:changed', { action: 'write', path });
                }
                async copyNode(srcPath, destPath) {
                    const node = await this.getNode(srcPath);
                    if (!node) return;
                    const newNode = { ...node, path: destPath, parent: destPath.substring(0, destPath.lastIndexOf('/')) || '/',
                        created: Date.now(), modified: Date.now() };
                    await this._dbPut(newNode);
                    eventBus.emit('fs:changed', { action: 'copy', srcPath, destPath });
                }
            }
            const vfs = new VirtualFileSystem();

            // ==================== PROCESS MANAGER ====================
            class ProcessManager {
                constructor() {
                    this.processes = new Map();
                    this.nextPid = 1;
                    this.startTime = Date.now();
                }
                create(name, type = 'app', priority = 0) {
                    const pid = this.nextPid++;
                    const proc = { pid, name, type, priority, state: 'running', created: Date.now(), cpuUsage: Math.random() *
                            15, memoryUsage: Math.floor(Math.random() * 80) + 10 };
                    this.processes.set(pid, proc);
                    eventBus.emit('proc:created', proc);
                    return pid;
                }
                kill(pid) {
                    const proc = this.processes.get(pid);
                    if (proc) { proc.state = 'terminated';
                        this.processes.delete(pid);
                        eventBus.emit('proc:killed', proc); }
                }
                suspend(pid) {
                    const proc = this.processes.get(pid);
                    if (proc) { proc.state = 'suspended';
                        eventBus.emit('proc:suspended', proc); }
                }
                resume(pid) {
                    const proc = this.processes.get(pid);
                    if (proc) { proc.state = 'running';
                        eventBus.emit('proc:resumed', proc); }
                }
                list() { return [...this.processes.values()]; }
                getUptime() { return Math.floor((Date.now() - this.startTime) / 1000); }
                getTotalCPU() { return [...this.processes.values()].reduce((s, p) => s + p.cpuUsage, 0); }
                getTotalMem() { return [...this.processes.values()].reduce((s, p) => s + p.memoryUsage, 0); }
            }
            const procManager = new ProcessManager();

            // ==================== WINDOW MANAGER ==================== */
            class WindowManager {
                constructor() {
                    this.windows = new Map();
                    this.nextWid = 1;
                    this.focusedWid = null;
                    this.zCounter = 10;
                    this.snapThreshold = 30;
                    this.container = document.getElementById('windows-container');
                }
                create(title, icon = '📄', width = 700, height = 460, contentHtml = '', appType = null) {
                    const wid = this.nextWid++;
                    const win = document.createElement('div');
                    win.className = 'window';
                    win.setAttribute('data-wid', wid);
                    win.setAttribute('role', 'dialog');
                    win.setAttribute('aria-label', title);
                    win.style.cssText =
                        `left:${60+wid*25}px;top:${50+wid*20}px;width:${width}px;height:${height}px;z-index:${++this.zCounter};`;
                    win.innerHTML = `
                <div class="titlebar" data-wid="${wid}">
                  <span class="tb-icon">${icon}</span>
                  <span class="tb-title">${title}</span>
                  <div class="tb-controls">
                    <button class="min-btn" title="Minimize" aria-label="Minimize">─</button>
                    <button class="max-btn" title="Maximize" aria-label="Maximize">□</button>
                    <button class="close-btn" title="Close" aria-label="Close">✕</button>
                  </div>
                </div>
                <div class="window-content">${contentHtml}</div>
                <div class="resize-handle nw"></div><div class="resize-handle n"></div><div class="resize-handle ne"></div>
                <div class="resize-handle w"></div><div class="resize-handle e"></div>
                <div class="resize-handle sw"></div><div class="resize-handle s"></div><div class="resize-handle se"></div>`;
                    this.container.appendChild(win);
                    this.windows.set(wid, { element: win, title, icon, appType, state: 'normal', prevBounds: null,
                        pid: procManager.create(title, appType || 'app') });
                    this._bindWindowEvents(win, wid);
                    this.focus(wid);
                    eventBus.emit('window:created', { wid, title });
                    return wid;
                }
                _bindWindowEvents(win, wid) {
                    const titlebar = win.querySelector('.titlebar');
                    let dragData = null;
                    titlebar.addEventListener('pointerdown', (e) => {
                        if (e.target.closest('.tb-controls')) return;
                        this.focus(wid);
                        const rect = win.getBoundingClientRect();
                        dragData = { wid, startX: e.clientX, startY: e.clientY, origLeft: rect.left, origTop: rect.top,
                            pointerId: e.pointerId };
                        win.setPointerCapture(e.pointerId);
                        win.style.transition = 'none';
                    });
                    win.addEventListener('pointermove', (e) => {
                        if (!dragData || e.pointerId !== dragData.pointerId) return;
                        const dx = e.clientX - dragData.startX;
                        const dy = e.clientY - dragData.startY;
                        win.style.left = Math.max(-100, dragData.origLeft + dx) + 'px';
                        win.style.top = Math.max(0, dragData.origTop + dy) + 'px';
                        this._checkSnap(win);
                    });
                    win.addEventListener('pointerup', (e) => {
                        if (dragData && e.pointerId === dragData.pointerId) {
                            win.style.transition = '';
                            dragData = null;
                        }
                    });
                    win.addEventListener('pointerdown', (e) => { this.focus(wid); });
                    win.querySelector('.close-btn').addEventListener('click', (e) => { e.stopPropagation();
                        this.close(wid); });
                    win.querySelector('.min-btn').addEventListener('click', (e) => { e.stopPropagation();
                        this.minimize(wid); });
                    win.querySelector('.max-btn').addEventListener('click', (e) => { e.stopPropagation();
                        this.toggleMaximize(wid); });
                    // Resize handles
                    win.querySelectorAll('.resize-handle').forEach(handle => {
                        handle.addEventListener('pointerdown', (e) => {
                            e.stopPropagation();
                            e.preventDefault();
                            const dir = handle.className.replace('resize-handle ', '').trim();
                            const rect = win.getBoundingClientRect();
                            const rData = { wid, dir, startX: e.clientX, startY: e.clientY, origW: rect.width,
                                origH: rect.height, origL: rect.left, origT: rect.top, pointerId: e
                                    .pointerId };
                            win.setPointerCapture(e.pointerId);
                            win.style.transition = 'none';
                            const onMove = (ev) => {
                                if (ev.pointerId !== rData.pointerId) return;
                                const dx = ev.clientX - rData.startX;
                                const dy = ev.clientY - rData.startY;
                                let nw = rData.origW,
                                    nh = rData.origH,
                                    nl = rData.origL,
                                    nt = rData.origT;
                                if (dir.includes('e')) nw = Math.max(280, rData.origW + dx);
                                if (dir.includes('s')) nh = Math.max(180, rData.origH + dy);
                                if (dir.includes('w')) { nw = Math.max(280, rData.origW - dx);
                                    nl = rData.origL + (rData.origW - nw); }
                                if (dir.includes('n')) { nh = Math.max(180, rData.origH - dy);
                                    nt = rData.origT + (rData.origH - nh); }
                                win.style.width = nw + 'px';
                                win.style.height = nh + 'px';
                                win.style.left = nl + 'px';
                                win.style.top = nt + 'px';
                            };
                            const onUp = () => { win.style.transition = '';
                                win.releasePointerCapture(rData.pointerId);
                                document.removeEventListener('pointermove', onMove);
                                document.removeEventListener('pointerup', onUp); };
                            document.addEventListener('pointermove', onMove);
                            document.addEventListener('pointerup', onUp, { once: true });
                        });
                    });
                }
                _checkSnap(win) {
                    const rect = win.getBoundingClientRect();
                    const desktopRect = document.getElementById('desktop').getBoundingClientRect();
                    if (rect.left < this.snapThreshold && rect.left > -this.snapThreshold) {
                        win.style.left = '0px';
                        win.style.top = '0px';
                        win.style.width = (desktopRect.width / 2) + 'px';
                        win.style.height = desktopRect.height + 'px';
                    } else if (rect.right > desktopRect.width - this.snapThreshold && rect.right < desktopRect.width + this
                        .snapThreshold) {
                        win.style.left = (desktopRect.width / 2) + 'px';
                        win.style.top = '0px';
                        win.style.width = (desktopRect.width / 2) + 'px';
                        win.style.height = desktopRect.height + 'px';
                    }
                }
                focus(wid) {
                    if (this.focusedWid === wid) return;
                    if (this.focusedWid && this.windows.has(this.focusedWid)) {
                        this.windows.get(this.focusedWid).element.classList.remove('focused');
                    }
                    this.focusedWid = wid;
                    const w = this.windows.get(wid);
                    if (w) {
                        w.element.classList.remove('minimized');
                        w.element.classList.add('focused');
                        w.element.style.zIndex = ++this.zCounter;
                        w.state = 'normal';
                        eventBus.emit('window:focused', { wid });
                        this._updateTaskbar();
                    }
                }
                minimize(wid) {
                    const w = this.windows.get(wid);
                    if (!w) return;
                    w.element.classList.add('minimized');
                    w.state = 'minimized';
                    if (this.focusedWid === wid) this.focusedWid = null;
                    eventBus.emit('window:minimized', { wid });
                    this._updateTaskbar();
                }
                toggleMaximize(wid) {
                    const w = this.windows.get(wid);
                    if (!w) return;
                    if (w.element.classList.contains('maximized')) {
                        w.element.classList.remove('maximized');
                        if (w.prevBounds) {
                            w.element.style.left = w.prevBounds.left;
                            w.element.style.top = w.prevBounds.top;
                            w.element.style.width = w.prevBounds.width;
                            w.element.style.height = w.prevBounds.height;
                        }
                        w.state = 'normal';
                    } else {
                        const rect = w.element.getBoundingClientRect();
                        w.prevBounds = { left: w.element.style.left, top: w.element.style.top, width: w.element.style
                                .width, height: w.element.style.height };
                        w.element.classList.add('maximized');
                        w.state = 'maximized';
                    }
                    this.focus(wid);
                }
                close(wid) {
                    const w = this.windows.get(wid);
                    if (!w) return;
                    w.element.classList.add('closing');
                    procManager.kill(w.pid);
                    const onEnd = () => {
                        w.element.remove();
                        this.windows.delete(wid);
                        if (this.focusedWid === wid) this.focusedWid = null;
                        this._updateTaskbar();
                        eventBus.emit('window:closed', { wid });
                    };
                    w.element.addEventListener('animationend', onEnd, { once: true });
                    setTimeout(() => onEnd(), 200);
                }
                getWindow(wid) { return this.windows.get(wid) || null; }
                listWindows() { return [...this.windows.entries()].map(([wid, w]) => ({ wid, title: w.title, icon: w.icon,
                        state: w.state, appType: w.appType })); }
                _updateTaskbar() { eventBus.emit('taskbar:update'); }
                focusOrRestore(wid) {
                    const w = this.windows.get(wid);
                    if (!w) return;
                    if (w.state === 'minimized') { w.element.classList.remove('minimized');
                        w.state = 'normal'; }
                    this.focus(wid);
                }
            }
            const windowManager = new WindowManager();

            // ==================== APP SETUP FUNCTIONS ====================
            function setupTerminal(winEl, wid) {
                const output = winEl.querySelector('#term-output');
                const input = winEl.querySelector('#term-input');
                let cmdHistory = [];
                let histIdx = -1;
                let currentPath = '/home/user';
                output.innerHTML =
                    '<span style="color:#5bf;">AetherOS Terminal v2.0</span>\n<span style="color:#888;">Type "help" for available commands.</span>\n\n';
                const append = (text, color = '#c0e0c0') => {
                    output.innerHTML += `<span style="color:${color}">${text}</span>\n`;
                    output.scrollTop = output.scrollHeight;
                };
                const commands = {
                    help: () => 'Available: help ls cd pwd mkdir touch rm cat echo clear date time whoami history find tree',
                    ls: async () => {
                        const nodes = await vfs.listDir(currentPath);
                        return nodes.map(n => (n.type === 'directory' ? '📁 ' : '📄 ') + n.path.split('/').pop())
                            .join('  ') || '(empty)';
                    },
                    pwd: () => currentPath,
                    cd: async (args) => {
                        const target = args[0] || '/';
                        const newPath = target.startsWith('/') ? target : currentPath + '/' + target;
                        const normalized = newPath.replace(/\/+/g, '/').replace(/\/$/, '') || '/';
                        const node = await vfs.getNode(normalized);
                        if (node && node.type === 'directory') { currentPath = normalized; return ''; }
                        return `cd: no such directory: ${target}`;
                    },
                    mkdir: async (args) => {
                        if (!args[0]) return 'Usage: mkdir <name>';
                        await vfs.createDir(currentPath + '/' + args[0]);
                        return `Created directory: ${args[0]}`;
                    },
                    touch: async (args) => {
                        if (!args[0]) return 'Usage: touch <filename>';
                        await vfs.createFile(currentPath + '/' + args[0], '');
                        return `Created file: ${args[0]}`;
                    },
                    rm: async (args) => {
                        if (!args[0]) return 'Usage: rm <name>';
                        await vfs.deleteNode(currentPath + '/' + args[0]);
                        return `Removed: ${args[0]}`;
                    },
                    cat: async (args) => {
                        if (!args[0]) return 'Usage: cat <file>';
                        const content = await vfs.readFile(currentPath + '/' + args[0]);
                        return content !== null ? content : `cat: ${args[0]}: No such file`;
                    },
                    echo: (args) => args.join(' '),
                    clear: () => { output.innerHTML = ''; return ''; },
                    date: () => new Date().toString(),
                    time: () => new Date().toLocaleTimeString(),
                    whoami: () => 'user',
                    history: () => cmdHistory.map((c, i) => `${i+1} ${c}`).join('\n'),
                    find: async (args) => {
                        const all = await vfs._dbGetAll();
                        const matches = all.filter(n => n.path.includes(args[0] || ''));
                        return matches.map(n => n.path).join('\n') || 'No matches';
                    },
                    tree: async () => {
                        const all = await vfs._dbGetAll();
                        const build = (parent, indent = '') => {
                            const children = all.filter(n => n.parent === parent);
                            return children.map(c => indent + (c.type === 'directory' ? '📁 ' : '📄 ') + c.path
                                .split('/').pop() + '\n' + (c.type === 'directory' ? build(c.path, indent +
                                    '  ') : '')).join('');
                        };
                        return build('/');
                    },
                };
                input.addEventListener('keydown', async (e) => {
                    if (e.key === 'Enter') {
                        const cmd = input.value.trim();
                        if (!cmd) return;
                        cmdHistory.push(cmd);
                        histIdx = cmdHistory.length;
                        append(`user@aetheros:~$ ${cmd}`, '#5bf');
                        const parts = cmd.split(/\s+/);
                        const cmdName = parts[0].toLowerCase();
                        const args = parts.slice(1);
                        if (commands[cmdName]) {
                            const result = await commands[cmdName](args);
                            if (result) append(result);
                        } else {
                            append(`Command not found: ${cmdName}. Type "help".`, '#e05555');
                        }
                        input.value = '';
                    } else if (e.key === 'ArrowUp') {
                        if (histIdx > 0) { histIdx--;
                            input.value = cmdHistory[histIdx]; }
                        e.preventDefault();
                    } else if (e.key === 'ArrowDown') {
                        if (histIdx < cmdHistory.length - 1) { histIdx++;
                            input.value = cmdHistory[histIdx]; } else { histIdx = cmdHistory.length;
                            input.value = ''; }
                        e.preventDefault();
                    }
                });
            }

            function setupNotes(winEl, wid) {
